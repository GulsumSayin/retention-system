# ─────────────────────────────────────────────────────────────────────────────
# Müşteri Tutundurma Zekâsı Platformu — Docker Compose
#
# Servisler:
#   web        → Flask API + dashboard  (port 5000)
#   llm_server → Qwen 2.5 / llama.cpp  (port 8080, sadece iç ağ)
#
# Başlatma:
#   docker compose up -d
#
# Model dosyası hazırlığı:
#   LLAMA_MODELS_DIR ortam değişkeni ile model klasörünüzü belirtin.
#   Örnek: set LLAMA_MODELS_DIR=C:/llama/models  (Windows)
#   Varsayılan: C:/llama/models
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Qwen 2.5 — llama.cpp sunucusu ────────────────────────────────────────
  llm_server:
    image: ghcr.io/ggerganov/llama.cpp:server
    volumes:
      # Model klasörünü container içine bağla (salt okunur)
      - ${LLAMA_MODELS_DIR:-C:/llama/models}:/models:ro
    command: >
      --model /models/qwen2.5-3b-instruct-q5_k_m.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 2048
      --log-disable
    restart: always
    healthcheck:
      # Model yüklenmesi 60–90 saniye sürebilir; buna göre start_period ayarlı
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ── Flask API + Dashboard ─────────────────────────────────────────────────
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      # llm_server container'ına service adıyla bağlan (Docker iç ağı)
      - LLM_BASE_URL=http://llm_server:8080/v1/chat/completions
    volumes:
      # Analiz sonuçları ve geçmiş kalıcı kalsın
      - ./data:/app/data
      - ./outputs:/app/outputs
    depends_on:
      - llm_server   # llm_server önce başlasın (sağlık kontrolü olmaksızın)
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
